listen: "0.0.0.0:8080"

providers:
  z.ai:
    protocol: anthropic
    base_url: https://api.z.ai/api/anthropic
    api_key_env: ZAI_KEY
  anthropic:
    protocol: anthropic
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_KEY

models:
  glm-4.5:
    provider: z.ai
    max_concurrent: 10
    max_requests: -1
  glm-5.1:
    provider: z.ai
    max_concurrent: 10
    max_requests: -1
  glm-4.6:
    provider: z.ai
    max_concurrent: 3
    max_requests: -1

pools:
  glm:
    - target: glm-5.1
      weight: 1
    - target: glm-4.6
      weight: 1
    - target: glm-4.5
      weight: 1
  hindsight:
    - target: glm-5.1
      weight: 1
    - target: glm-4.6
      weight: 1
    - target: glm-4.5
      weight: 1
