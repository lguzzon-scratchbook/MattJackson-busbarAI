name: Release

# Cross-compile the busbar binary for major targets and attach tarballs to the
# GitHub Release when a version tag (e.g. v0.9.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Builds --release for the target (installing the toolchain + cross-linker as
      # needed), tarballs the `busbar` binary, and uploads it to the Release for this tag.
      - name: Build and upload busbar
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: busbar
          target: ${{ matrix.target }}
          archive: busbar-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
